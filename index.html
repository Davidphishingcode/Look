<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Heart for Edlawit</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const words = [];
    const wordText = "i love you";
    const centerName = "EDLAWIT";
    const totalWords = 40; // ቃላቶቹ እንዳይጠጋገቡ ቁጥራቸውን ቀንሼዋለሁ

    // ልክ እንደ ቪዲዮው ትክክለኛ የልብ ቅርጽ ቀመር
    function getHeartPoint(t) {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: x * 13, y: y * 13 }; // ቅርጹ ሰፋ እንዲል
    }

    class Particle {
        constructor(index) {
            this.t = (index / totalWords) * Math.PI * 2;
            this.speed = 0.02; 
        }

        update() {
            this.t += this.speed; // በልቡ ቅርጽ ላይ እንዲዞሩ
        }

        draw() {
            const pos = getHeartPoint(this.t);
            const x = canvas.width / 2 + pos.x;
            const y = canvas.height / 2 + pos.y;

            ctx.font = "bold 15px Arial";
            ctx.fillStyle = "#ff007f"; // ደማቅ ሮዝ
            ctx.textAlign = "center";
            ctx.fillText(wordText, x, y);
        }
    }

    for (let i = 0; i < totalWords; i++) {
        words.push(new Particle(i));
    }

    function animate() {
        // ዳራውን ጥቁር ማድረግ (ይህ ነው ቃላቶቹ እንዳይደራረቡ የሚያደርገው)
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // መሃል ላይ ያለው ስም
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ff007f";
        ctx.fillStyle = "white";
        ctx.font = "bold 45px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(centerName, canvas.width / 2, canvas.height / 2);
        ctx.shadowBlur = 0;

        // ቃላቶቹን መሳል
        words.forEach(p => {
            p.update();
            p.draw();
        });

        requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
